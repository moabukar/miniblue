replicaCount: 1

image:
  repository: moabukar/miniblue
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  httpPort: 4566
  httpsPort: 4567

persistence:
  enabled: false
  storageClass: ""
  size: 1Gi

databaseUrl: ""
databaseUrlSecret:
  name: ""
  key: ""

env:
  PORT: "4566"
  TLS_PORT: "4567"
  LOG_LEVEL: "info"

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi
