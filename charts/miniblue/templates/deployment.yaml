apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: miniblue
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: miniblue
  template:
    metadata:
      labels:
        app: miniblue
    spec:
      containers:
        - name: miniblue
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 4566
              name: http
            - containerPort: 4567
              name: https
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: PERSISTENCE
              value: "1"
            {{- end }}
            {{- if .Values.databaseUrl }}
            - name: DATABASE_URL
              value: {{ .Values.databaseUrl | quote }}
            {{- else if .Values.databaseUrlSecret.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseUrlSecret.name }}
                  key: {{ .Values.databaseUrlSecret.key | default "url" }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /home/miniblue
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
      {{- end }}
