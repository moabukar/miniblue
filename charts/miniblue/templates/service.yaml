apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: miniblue
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      name: http
    - port: {{ .Values.service.httpsPort }}
      targetPort: https
      name: https
  selector:
    app: miniblue
