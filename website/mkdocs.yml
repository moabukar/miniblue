site_name: miniblue
site_url: https://moabukar.github.io/miniblue
site_description: Local Azure development. One binary. No account needed.
site_author: Mo Abukar
repo_url: https://github.com/moabukar/miniblue
repo_name: moabukar/miniblue
edit_uri: edit/main/website/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Guides:
    - Terraform: guides/terraform.md
    - azlocal CLI: guides/azlocal.md
    - Azure CLI: guides/azure-cli.md
    - Docker: guides/docker.md
  - Services:
    - Overview: services/overview.md
    - Resource Groups: services/resource-groups.md
    - Blob Storage: services/blob-storage.md
    - Key Vault: services/key-vault.md
    - Virtual Networks: services/virtual-networks.md
    - DNS Zones: services/dns-zones.md
    - Container Registry: services/container-registry.md
    - Cosmos DB: services/cosmos-db.md
    - Service Bus: services/service-bus.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/moabukar/miniblue
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/moabukar/miniblue
