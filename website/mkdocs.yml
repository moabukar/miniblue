site_name: miniblue
site_url: https://miniblue.io
site_description: Local Azure development. One binary. No account needed.
site_author: Mo Abukar
repo_url: https://github.com/moabukar/miniblue
repo_name: moabukar/miniblue
edit_uri: edit/main/website/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Guides:
    - Terraform: guides/terraform.md
    - Pulumi: guides/pulumi.md
    - SDKs (Python, Go, JS): guides/sdk.md
    - azlocal CLI: guides/azlocal.md
    - CLI Reference: guides/azure-cli.md
    - Docker: guides/docker.md
  - Services:
    - Overview: services/overview.md
    - API Parity Matrix: services/parity.md
    - Resource Groups: services/resource-groups.md
    - Storage Accounts: services/storage-accounts.md
    - Blob Storage: services/blob-storage.md
    - Table Storage: services/table-storage.md
    - Queue Storage: services/queue-storage.md
    - Key Vault: services/key-vault.md
    - Cosmos DB: services/cosmos-db.md
    - Service Bus: services/service-bus.md
    - Event Grid: services/event-grid.md
    - App Configuration: services/app-configuration.md
    - Azure Functions: services/functions.md
    - Virtual Networks: services/virtual-networks.md
    - Public IP Addresses: services/public-ip-addresses.md
    - Network Security Groups: services/network-security-groups.md
    - Load Balancer: services/load-balancer.md
    - Application Gateway: services/application-gateway.md
    - DNS Zones: services/dns-zones.md
    - Container Registry: services/container-registry.md
    - Container Instances: services/container-instances.md
    - DB for PostgreSQL: services/database-postgresql.md
    - DB for MySQL: services/database-mysql.md
    - Azure SQL Database: services/database-sql.md
    - Azure Cache for Redis: services/redis.md
  - Architecture:
    - Overview: architecture/overview.md
    - Scope and Philosophy: architecture/scope.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/moabukar/miniblue
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/moabukar/miniblue
