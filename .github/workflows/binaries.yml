name: Release Binaries (5 platforms)

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build miniblue
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          LDFLAGS="-s -w -X github.com/moabukar/miniblue/internal/server.Version=${VERSION}"
          go build -ldflags="${LDFLAGS}" -o miniblue-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/miniblue
          go build -ldflags="${LDFLAGS}" -o azlocal-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/azlocal

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            miniblue-*
            azlocal-*

  checksums:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir assets && cd assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern 'miniblue-*' --pattern 'azlocal-*'

      - name: Generate SHA256SUMS
        run: |
          cd assets
          sha256sum miniblue-* azlocal-* | sort -k2 > ../SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat ../SHA256SUMS

      - name: Upload SHA256SUMS to release
        uses: softprops/action-gh-release@v3
        with:
          files: SHA256SUMS
