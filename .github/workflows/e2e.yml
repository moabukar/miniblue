name: E2E Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run E2E tests against miniblue container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build miniblue image from PR
        run: docker build -t miniblue:pr .

      - name: Start miniblue
        run: |
          docker run -d --name miniblue -p 4566:4566 -p 4567:4567 miniblue:pr
          echo "Waiting for miniblue..."
          for i in $(seq 1 30); do
            if curl -fs http://localhost:4566/health > /dev/null 2>&1; then
              echo "miniblue is ready"
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://localhost:4566/health | python3 -m json.tool; then
            echo "miniblue did not become healthy; container logs:"
            docker logs miniblue || true
            exit 1
          fi

      - name: Test health
        run: |
          curl -s http://localhost:4566/health | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          assert d['status'] == 'running'
          print(f'OK: {d[\"service_count\"]} services')
          "

      - name: Test resource groups
        run: |
          curl -s -X PUT "http://localhost:4566/subscriptions/s1/resourcegroups/test-rg" \
            -H "Content-Type: application/json" -d '{"location":"eastus"}'
          curl -s http://localhost:4566/subscriptions/s1/resourcegroups/test-rg | python3 -c "
          import json,sys; assert json.load(sys.stdin)['name'] == 'test-rg'; print('OK: RG')
          "

      - name: Test key vault
        run: |
          curl -s -X PUT "http://localhost:4566/keyvault/v1/secrets/s1" \
            -H "Content-Type: application/json" -d '{"value":"secret"}'
          curl -s http://localhost:4566/keyvault/v1/secrets/s1 | python3 -c "
          import json,sys; assert json.load(sys.stdin)['value'] == 'secret'; print('OK: KV')
          "

      - name: Test blob storage
        run: |
          curl -s -X PUT "http://localhost:4566/blob/a1/c1"
          curl -s -X PUT "http://localhost:4566/blob/a1/c1/test.txt" -d "hello"
          BODY=$(curl -s http://localhost:4566/blob/a1/c1/test.txt)
          [ "$BODY" = "hello" ] && echo "OK: Blob" || exit 1

      - name: Test cosmos db
        run: |
          curl -s -X POST "http://localhost:4566/cosmosdb/a1/dbs/d1/colls/c1/docs" \
            -H "Content-Type: application/json" -d '{"id":"1","name":"test"}'
          curl -s http://localhost:4566/cosmosdb/a1/dbs/d1/colls/c1/docs/1 | python3 -c "
          import json,sys; assert json.load(sys.stdin)['name'] == 'test'; print('OK: Cosmos')
          "

      - name: Test service bus
        run: |
          curl -s -X PUT "http://localhost:4566/servicebus/ns/queues/q1"
          curl -s -X POST "http://localhost:4566/servicebus/ns/queues/q1/messages" \
            -H "Content-Type: application/json" -d '{"body":"msg1"}'
          curl -s http://localhost:4566/servicebus/ns/queues/q1/messages/head | python3 -c "
          import json,sys; assert json.load(sys.stdin)['body'] == 'msg1'; print('OK: Service Bus')
          "

      - name: Test AKS
        run: |
          curl -s -X PUT "http://localhost:4566/subscriptions/s1/resourcegroups/aks-rg" \
            -H "Content-Type: application/json" -d '{"location":"eastus"}'
          curl -s -X PUT "http://localhost:4566/subscriptions/s1/resourceGroups/aks-rg/providers/Microsoft.ContainerService/managedClusters/k1" \
            -H "Content-Type: application/json" \
            -d '{"location":"eastus","identity":{"type":"SystemAssigned"},"properties":{"dnsPrefix":"k1","agentPoolProfiles":[{"name":"default","count":1,"vmSize":"Standard_DS2_v2","mode":"System"}]}}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['name']=='k1' and d['properties']['provisioningState']=='Succeeded'; print('OK: AKS create')"
          curl -s "http://localhost:4566/subscriptions/s1/resourcegroups/aks-rg/providers/Microsoft.ContainerService/managedClusters" \
            | python3 -c "import json,sys; assert len(json.load(sys.stdin)['value'])==1; print('OK: AKS list')"
          curl -s -X POST "http://localhost:4566/subscriptions/s1/resourceGroups/aks-rg/providers/Microsoft.ContainerService/managedClusters/k1/listClusterAdminCredential" \
            -H "Content-Type: application/json" -d '{}' \
            | python3 -c "
          import json, sys, base64
          d = json.load(sys.stdin)
          assert d['kubeconfigs'][0]['name'] == 'clusterAdmin'
          cfg = base64.b64decode(d['kubeconfigs'][0]['value']).decode()
          assert 'apiVersion: v1' in cfg and 'kind: Config' in cfg and 'k1' in cfg
          print('OK: AKS get-credentials')
          "
          curl -s -X DELETE "http://localhost:4566/subscriptions/s1/resourceGroups/aks-rg/providers/Microsoft.ContainerService/managedClusters/k1" \
            -o /dev/null -w '%{http_code}' | grep -q '^204$' && echo 'OK: AKS delete'

      - name: Test reset
        run: |
          curl -s -X POST http://localhost:4566/_miniblue/reset
          curl -s http://localhost:4566/subscriptions/s1/resourcegroups | python3 -c "
          import json,sys; assert len(json.load(sys.stdin)['value']) == 0; print('OK: Reset')
          "

      - name: Test database services
        run: |
          curl -s -X PUT "http://localhost:4566/subscriptions/s1/resourcegroups/rg1" \
            -H "Content-Type: application/json" -d '{"location":"eastus"}'
          curl -s -X PUT "http://localhost:4566/subscriptions/s1/resourceGroups/rg1/providers/Microsoft.DBforPostgreSQL/flexibleServers/pg1" \
            -H "Content-Type: application/json" -d '{"location":"eastus"}'
          curl -s -X PUT "http://localhost:4566/subscriptions/s1/resourceGroups/rg1/providers/Microsoft.Cache/redis/r1" \
            -H "Content-Type: application/json" -d '{"location":"eastus","properties":{"sku":{"name":"Basic","family":"C","capacity":1}}}'
          curl -s -X PUT "http://localhost:4566/subscriptions/s1/resourceGroups/rg1/providers/Microsoft.ContainerService/managedClusters/k-cascade" \
            -H "Content-Type: application/json" -d '{"location":"eastus","identity":{"type":"SystemAssigned"},"properties":{"dnsPrefix":"k-cascade"}}'
          echo "OK: DB services"

      - name: Test cascade delete
        run: |
          curl -s -X DELETE "http://localhost:4566/subscriptions/s1/resourcegroups/rg1"
          sleep 1
          CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:4566/subscriptions/s1/resourceGroups/rg1/providers/Microsoft.Cache/redis/r1")
          [ "$CODE" = "404" ] && echo "OK: Cascade delete (redis)" || (echo "FAIL: Expected 404, got $CODE" && exit 1)
          CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:4566/subscriptions/s1/resourceGroups/rg1/providers/Microsoft.ContainerService/managedClusters/k-cascade")
          [ "$CODE" = "404" ] && echo "OK: Cascade delete (aks)" || (echo "FAIL: Expected 404 for AKS, got $CODE" && exit 1)

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build CLI
        run: |
          go build -ldflags="-s -w" -o bin/azlocal ./cmd/azlocal

      - name: Test storage account operations
        env:
          LOCAL_AZURE_ENDPOINT: http://localhost:4566
        run: |
          ./bin/azlocal storage account create --resource-group testRG --name testacct
          ./bin/azlocal storage account list --resource-group testRG | grep -q "testacct" && echo "OK: List accounts"
          ./bin/azlocal storage account show --resource-group testRG --name testacct | grep -q "testacct" && echo "OK: Show account"
          ./bin/azlocal storage account list-keys --resource-group testRG --name testacct | grep -q "key1" && echo "OK: List keys"
          ./bin/azlocal storage account delete --resource-group testRG --name testacct | grep -qi "deleted" && echo "OK: Delete account"

      - name: Test azlocal aks operations
        env:
          LOCAL_AZURE_ENDPOINT: http://localhost:4566
        run: |
          ./bin/azlocal group create --name aksRG --location eastus
          ./bin/azlocal aks create --resource-group aksRG --name testaks --node-count 2 | grep -q "testaks" && echo "OK: aks create"
          ./bin/azlocal aks list --resource-group aksRG | grep -q "testaks" && echo "OK: aks list"
          ./bin/azlocal aks show --resource-group aksRG --name testaks | grep -q "Succeeded" && echo "OK: aks show"
          ./bin/azlocal aks get-credentials --resource-group aksRG --name testaks --file - | grep -q "apiVersion: v1" && echo "OK: aks get-credentials"
          ./bin/azlocal aks delete --resource-group aksRG --name testaks | grep -qi "deleted" && echo "OK: aks delete"

      - name: Cleanup
        if: always()
        run: docker stop miniblue && docker rm miniblue
