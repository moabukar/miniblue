services:
  miniblue:
    build: .
    image: moabukar/miniblue:latest
    ports:
      - "4566:4566"
      - "4567:4567"
    environment:
      - PORT=4566
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4566/health"]
      interval: 10s
      timeout: 5s
      retries: 3
